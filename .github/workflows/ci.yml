name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Offline pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Run offline tests
        run: uv run pytest -v
