x-ps-price-app: &ps-price-app
  image: ps-price:latest
  environment:
    PS_PRICE_ALLOWED_HOSTS: localhost,127.0.0.1
    PS_PRICE_DATABASE_PATH: /data/db.sqlite3
  volumes:
    - /Users/samwang/dockercompose/ps-price/data:/data

services:
  web:
    <<: *ps-price-app
    build:
      context: .
    ports:
      - "127.0.0.1:8000:8000"
    command:
      - sh
      - -c
      - uv run python manage.py migrate --noinput && exec uv run python manage.py runserver 0.0.0.0:8000
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3).read()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  scheduler:
    <<: *ps-price-app
    environment:
      PS_PRICE_ALLOWED_HOSTS: localhost,127.0.0.1
      PS_PRICE_DATABASE_PATH: /data/db.sqlite3
      PS_PRICE_SYNC_AT: "03:30"
      PS_PRICE_SYNC_TIMEZONE: Asia/Taipei
      PS_PRICE_SYNC_MODE: catalog-and-snapshot
      PS_PRICE_SYNC_MAX_PAGES: "500"
    depends_on:
      web:
        condition: service_healthy
    command:
      - uv
      - run
      - python
      - manage.py
      - run_daily_sync_scheduler
